<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Progress Card</title>
<style>
  :root {
    --mint: #2DB87A;
    --mint-50: #E8F7F0;
    --mint-100: #D1EFE1;
    --mint-200: #A6E0C4;
    --mint-700: #1F8A5A;
    --ink: #0F1F18;
    --muted: #6B7A72;
    --line: #E6ECE9;
    --bg: #F4F7F5;
    --card: #FFFFFF;
    --shadow: 0 1px 2px rgba(15, 31, 24, 0.04), 0 12px 32px -12px rgba(15, 31, 24, 0.12);
    --radius: 20px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--line);
  }

  /* ---------- Header ---------- */
  .card-header {
    position: relative;
    padding: 28px 24px 20px;
    background:
      radial-gradient(120% 80% at 0% 0%, rgba(45, 184, 122, 0.18) 0%, rgba(45, 184, 122, 0) 60%),
      linear-gradient(135deg, #FFFFFF 0%, var(--mint-50) 100%);
    border-bottom: 1px solid var(--line);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .term-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .term-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 0 3px rgba(45, 184, 122, 0.18);
  }

  .menu-btn {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .menu-btn:hover { background: var(--mint-50); color: var(--mint-700); }

  .profile {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar-ring {
    --size: 82px;
    --progress: 82;
    width: var(--size);
    height: var(--size);
    display: grid;
    place-items: center;
    border-radius: 50%;
    background:
      conic-gradient(var(--mint) calc(var(--progress) * 1%), var(--mint-100) 0);
    padding: 4px;
  }

  .avatar-ring::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      conic-gradient(var(--mint) calc(var(--progress) * 1%), var(--mint-100) 0);
  }

  .avatar {
    width: 74px;
    height: 74px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFFFFF, var(--mint-50));
    display: grid;
    place-items: center;
    font-size: 26px;
    font-weight: 700;
    color: var(--mint-700);
    border: 3px solid var(--card);
    z-index: 1;
    position: relative;
  }

  .avatar-badge {
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--mint);
    color: #fff;
    display: grid;
    place-items: center;
    border: 3px solid var(--card);
    z-index: 2;
  }

  .identity h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .identity .meta {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .identity .meta .sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.5;
  }

  /* ---------- Overall progress ---------- */
  .overall {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }

  .overall-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .overall-value {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .overall-value .num {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .overall-value .pct {
    font-size: 20px;
    font-weight: 600;
    color: var(--mint-700);
  }

  .trend {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    background: var(--mint-50);
    color: var(--mint-700);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  /* ---------- Subjects ---------- */
  .subjects {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .section-title .view-all {
    font-size: 12px;
    color: var(--mint-700);
    cursor: pointer;
    font-weight: 500;
  }

  .subject {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .subject:last-child { margin-bottom: 0; }

  .subject-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--mint-50);
    color: var(--mint-700);
    display: grid;
    place-items: center;
    font-size: 14px;
  }

  .subject-body .subject-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .bar {
    width: 100%;
    height: 6px;
    background: var(--mint-50);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mint) 0%, #3FD492 100%);
    border-radius: 999px;
    transition: width 0.6s ease;
  }

  .subject-pct {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    min-width: 36px;
    text-align: right;
  }

  /* ---------- Badges ---------- */
  .badges {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
  }

  .badge-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .badge {
    padding: 12px 8px;
    text-align: center;
    background: var(--mint-50);
    border: 1px solid var(--mint-100);
    border-radius: 14px;
    transition: transform 0.15s ease;
  }

  .badge:hover { transform: translateY(-2px); }

  .badge-icon {
    width: 34px;
    height: 34px;
    margin: 0 auto 6px;
    border-radius: 50%;
    background: var(--card);
    display: grid;
    place-items: center;
    font-size: 16px;
    box-shadow: 0 2px 8px -2px rgba(45, 184, 122, 0.35);
  }

  .badge-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--mint-700);
  }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  .stat {
    padding: 18px 12px;
    text-align: center;
    border-right: 1px solid var(--line);
  }

  .stat:last-child { border-right: none; }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .stat-value .suffix {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-left: 2px;
  }

  @media (max-width: 420px) {
    .card-header { padding: 20px 18px 16px; }
    .overall, .subjects, .badges { padding: 16px 18px; }
    .identity h1 { font-size: 18px; }
  }
</style>
</head>
<body>
  <main class="page">
    <article class="card" role="article" aria-label="Student progress card">

      <header class="card-header">
        <div class="header-top">
          <span class="term-pill"><span class="dot"></span>SPRING TERM · 2026</span>
          <button class="menu-btn" aria-label="More options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>

        <div class="profile">
          <div class="avatar-wrap">
            <div class="avatar-ring" style="--progress: 82;">
              <div class="avatar" aria-hidden="true">AY</div>
            </div>
            <div class="avatar-badge" title="Top performer">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
          </div>
          <div class="identity">
            <h1>Ava Yılmaz</h1>
            <div class="meta">
              <span>Grade 10 · Class B</span>
              <span class="sep"></span>
              <span>ID 2026-0418</span>
            </div>
          </div>
        </div>
      </header>

      <section class="overall" aria-label="Overall progress">
        <div>
          <div class="overall-label">Overall Progress</div>
          <div class="overall-value"><span class="num">82</span><span class="pct">%</span></div>
        </div>
        <span class="trend" title="Up 4% vs last term">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
          +4% vs last term
        </span>
      </section>

      <section class="subjects" aria-label="Subject breakdown">
        <h2 class="section-title">Subjects <span class="view-all">View all</span></h2>

        <div class="subject">
          <div class="subject-icon" aria-hidden="true">∑</div>
          <div class="subject-body">
            <div class="subject-name">Mathematics</div>
            <div class="bar"><div class="bar-fill" style="width: 88%;"></div></div>
          </div>
          <div class="subject-pct">88%</div>
        </div>

        <div class="subject">
          <div class="subject-icon" aria-hidden="true">⚗</div>
          <div class="subject-body">
            <div class="subject-name">Science</div>
            <div class="bar"><div class="bar-fill" style="width: 76%;"></div></div>
          </div>
          <div class="subject-pct">76%</div>
        </div>

        <div class="subject">
          <div class="subject-icon" aria-hidden="true">A</div>
          <div class="subject-body">
            <div class="subject-name">English</div>
            <div class="bar"><div class="bar-fill" style="width: 91%;"></div></div>
          </div>
          <div class="subject-pct">91%</div>
        </div>

        <div class="subject">
          <div class="subject-icon" aria-hidden="true">⌛</div>
          <div class="subject-body">
            <div class="subject-name">History</div>
            <div class="bar"><div class="bar-fill" style="width: 73%;"></div></div>
          </div>
          <div class="subject-pct">73%</div>
        </div>
      </section>

      <section class="badges" aria-label="Achievements">
        <h2 class="section-title">Achievements</h2>
        <div class="badge-row">
          <div class="badge">
            <div class="badge-icon">🏆</div>
            <div class="badge-name">Top 10%</div>
          </div>
          <div class="badge">
            <div class="badge-icon">📚</div>
            <div class="badge-name">Book Worm</div>
          </div>
          <div class="badge">
            <div class="badge-icon">⚡</div>
            <div class="badge-name">Streak 30d</div>
          </div>
        </div>
      </section>

      <section class="stats" aria-label="Key stats">
        <div class="stat">
          <div class="stat-label">GPA</div>
          <div class="stat-value">3.82<span class="suffix">/4.0</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">Attendance</div>
          <div class="stat-value">96<span class="suffix">%</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">Rank</div>
          <div class="stat-value">#4<span class="suffix">/128</span></div>
        </div>
      </section>

    </article>
  </main>
</body>
</html>
